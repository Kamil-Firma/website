<html>
<head>
    <title>Hopping Out - Updates</title>
    <link rel="icon" href="../assets/hoppingout/favicon.png">
    <style>
        body {
            background-image: url("../assets/hoppingout/bg.png");
            background-attachment: fixed;
            background-size: cover;
            color: white;
            font-family: 'CyborgSister';
            font-size: 29px;
        }
        img {
            image-rendering: pixelated;
        }
        a:link {
            color: #53c6f7;
        }
        a:visited {
            color: #53c6f7;
        }

        .button {
            text-decoration: none;
            font-size: 28px;
            padding: 5px;
            font-family: 'DigitalDisco';
            cursor: pointer;
            background-image: url("../assets/hoppingout/grass.png");
            color: white;
            border-color: #172810;
            border-width: 6px;
            border-style: solid;
        }
        .button:hover {
            background-image: url("../assets/hoppingout/grass_countryside.png");
            border-color: #45620d;
        }
        h3 {
            font-family: 'DigitalDisco';
            padding: 0px;
        }

        #logo {
            text-align: center;
            position: relative;
            padding: 1%;
        }
        #logo_img {
            max-width: 100%;
            position: relative;
        }
        .text {
            margin: auto;
            text-align: center;
            max-width: 100%;
            padding-left: 10%;
            padding-right: 10%;
        }
        #article {
            background-image: url("../assets/hoppingout/bg_full.png");
            background-attachment: fixed;
            background-size: cover;
            width: 100%;
            min-height: 70%;
            border-top: white 6px solid;
            border-bottom: white 6px solid;
        }
        #article_wrap {
            padding: 1%;
        }
        #article img {
            max-width: 70%;
            border: white 1px dashed;
            cursor: crosshair;
            margin: 10px;
        }
        #update_title {
            font-family: 'DigitalDisco';
            font-size: 200%;
            width: 80%;
        }
        #update_date {
            position: relative;
            top: -10;
            color: #70ed63;
        }
        #update_banner img {
            max-width: 90%;
            max-height: 300px;
            cursor: auto;
        }
        #update_text i {
            color: #f67c7c;
        }
        .update_load_button {
            width: 1000px;
            max-width: 90%;
            cursor: pointer;
            background-image: url("../assets/hoppingout/grass_dark.png");
            border: white 1px dashed;
            margin: 5px;
            padding-left: 5px;
        }
        .update_load_button:hover {
            background-image: url("../assets/hoppingout/grass_countryside.png");
        }
    </style>
</head>
<body>
    <br>
    <div class="text">
        <a class="button" target='_blank' href='./index'>BACK TO MAIN PAGE</a>
    </div>
    <div id="logo">
        <img id="logo_img" src="../assets/hoppingout/logo.png" width=600>
        <br>
        <a style="font-family:'DigitalDisco'; color:#a8e1f9">Updates</a>
    </div>
    <hr>
    <div id="updatelist"></div>
    <hr>
    <div id="article">
        <div id="article_wrap">
            <div id="update_banner"></div>
            <div id="update_title"></div>
            <div id="update_date"></div>
            <div id="update_text"></div>
        </div>
    </div>
    <br>
    <div class="text">
        <a class="button" onclick='back_to_top()'>BACK TO TOP</a>
    </div>
    <br>

    <script src="update_data.js"></script>
    <script>
        //every frame
        time = 0;
        croak_time = 0;
        function frame(){
            time ++;
            var frame_timeout = setTimeout(frame, 33);

            //logo scaling
            document.getElementById("logo").style.top = Math.sin(time*0.05)*6;

            //frog croaking
            var frog_image_element = document.getElementById("croakfrog");
            if( frog_image_element != null ){
                var frog_img = "frog.png";
                if( croak_time>0 ){
                    croak_time --;
                    frog_img = "frog_croak.png";
                }
                frog_image_element.src = "../assets/hoppingout/" + frog_img;
            }
        }
        frame();

        //loading update list
        var update_list = "<ul>";
        for(i=update_count; i>=0; i--){
            var mydata = get_update_data(i);
            update_list += "<li>";
            update_list += "<div class='update_load_button' onclick='load_update("+i+")'>";
            update_list += "<a style='font-size:24px; color:yellow;'>";
            update_list += "(" + mydata.date + ") ";
            update_list += "</a>";
            update_list += mydata.title;
            update_list += "</div>";
            update_list += "</li>";
        }
        update_list += "</ul>";
        document.getElementById("updatelist").innerHTML = update_list;

        //loading update text
        function load_update(uid, forced=false){
            var mydata = get_update_data(uid);
            document.getElementById("update_title").innerHTML = mydata.title;
            document.getElementById("update_date").innerHTML = mydata.date;
            document.getElementById("update_text").innerHTML = mydata.text;

            //banner
            var bannerhtml = "";
            if( mydata.banner != "" ){
                bannerhtml = "<img src='../assets/hoppingout/updates/" + mydata.banner + "'>";
            }
            document.getElementById("update_banner").innerHTML = bannerhtml;

            //scrolling down
            if( forced==false ){
                document.getElementById("update_banner").scrollIntoView({behavior: "smooth", block: "start", inline: "nearest"});
            }

            //replace frogs with croakable frogs
            var frogelem = document.getElementById("croakfrogspot");
            if( frogelem!=null ){
                frogelem.innerHTML = '<img src="../assets/hoppingout/frog.png" id="croakfrog" onclick="croak_frog()" style="border:none;cursor:pointer;">';
            }
        }
        load_update(update_count, true);

        //back to top
        function back_to_top(){
            document.getElementById("logo").scrollIntoView({behavior: "smooth", block: "start", inline: "nearest"});
        }

        //croak frog
        function croak_frog(){
            croak_time = 25;
            var audio = new Audio( '../assets/hoppingout/sfx_frogcroak.ogg' );
            audio.play();
        }
    </script>
</body>
</html>
